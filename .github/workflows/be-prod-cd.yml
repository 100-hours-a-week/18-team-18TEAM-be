name: CD - PROD (BE)

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: be-prod-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      APP_NAME: "BizKit-BE"
      APP_STAGE: prod
      HEALTH_URL: http://127.0.0.1:8080/actuator/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js (for semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          npm install --no-audit --no-fund

      - name: Semantic Release (prod)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx --no-install semantic-release

      - name: Read version from gradle.properties
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          if [[ -z "$VERSION" ]]; then
            echo "version not found in gradle.properties" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Buildah
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          AWS_REGION="${{ secrets.AWS_REGION }}"
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY_BE_PROD }}"
          if [[ -z "${ECR_REPOSITORY}" ]]; then
            ECR_REPOSITORY="bizkit-be-prod"
          fi

          aws ecr get-login-password --region "${AWS_REGION}" | \
            buildah login --username AWS --password-stdin "${ECR_REGISTRY}"

          if ! aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null
          fi

          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Build and Push BE Container Image
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.value }}"
          IMAGE_TAG="prod-${VERSION}-${GITHUB_SHA::7}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          buildah bud --layers --arch arm64 --platform linux/arm64 -f Containerfile -t "${IMAGE_URI}" .
          buildah push "${IMAGE_URI}"

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Build CodeDeploy bundle (BE)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${{ steps.ver.outputs.value }}
          BUCKET="${{ secrets.S3_BUCKET }}"

          if [[ -z "${VERSION}" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi

          if [[ -z "${IMAGE_URI:-}" ]]; then
            echo "IMAGE_URI is empty" >&2
            exit 1
          fi

          rm -rf bundle && mkdir -p bundle/deploy

          cp deploy/appspec-container.yml bundle/appspec.yml
          cp deploy/start-container.sh bundle/deploy/start-container.sh
          cp deploy/stop-container.sh bundle/deploy/stop-container.sh
          cp deploy/validate-container.sh bundle/deploy/validate-container.sh
          cp deploy/deploy-be-container.sh bundle/deploy/deploy-be-container.sh

          cat > bundle/deploy/env.sh <<EOF_ENV
          RELEASE_ID='${{ steps.ver.outputs.value }}'
          APP_STAGE='${{ env.APP_STAGE }}'
          IMAGE_URI='${IMAGE_URI}'
          HEALTH_URL='${HEALTH_URL}'
          EOF_ENV

          echo "[debug] bundle/deploy/env.sh"
          cat bundle/deploy/env.sh

          (cd bundle && zip -r ../bundle.zip .)
          unzip -l bundle.zip

      - name: Upload bundle.zip to S3
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${{ steps.ver.outputs.value }}
          BUCKET="${{ secrets.S3_BUCKET }}"

          BUNDLE_KEY="${{ secrets.S3_PREFIX }}/${APP_STAGE}/codedeploy/be/${VERSION}/bundle-${{ github.run_id }}.zip"
          aws s3 cp bundle.zip "s3://$BUCKET/$BUNDLE_KEY"
          echo "BUNDLE_KEY=$BUNDLE_KEY" >> "$GITHUB_ENV"

      - name: Create CodeDeploy deployment & wait
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ secrets.CODEDEPLOY_APP_BE_PROD }}"
          DG="${{ secrets.CODEDEPLOY_DG_BE_PROD }}"

          DEPLOY_ID="$(aws deploy create-deployment \
            --application-name "$APP" \
            --deployment-group-name "$DG" \
            --s3-location bucket="$BUCKET",key="$BUNDLE_KEY",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query "deploymentId" --output text)"

          echo "deploymentId=$DEPLOY_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOY_ID"
          echo "CodeDeploy SUCCESS"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="❌ BE PROD CD 실패 ❌
          Repo: \`${{ github.repository }}\`
          Branch: \`${{ github.head_ref || github.ref_name }}\`
          Workflow: \`${{ github.workflow }}\`
          Job: \`${{ github.job }}\`
          Author: \`${{ github.actor }}\`
          Stage: \`${APP_STAGE}\`
          Version: \`${{ steps.ver.outputs.value }}\`
          링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          JSON_MESSAGE=$(printf '%s\n' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"content": sys.stdin.read()}))')
          curl -X POST -H "Content-Type: application/json" -d "$JSON_MESSAGE" "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="✅ BE PROD CD 성공 ✅
          Repo: \`${{ github.repository }}\`
          Branch: \`${{ github.head_ref || github.ref_name }}\`
          Workflow: \`${{ github.workflow }}\`
          Job: \`${{ github.job }}\`
          Author: \`${{ github.actor }}\`
          Stage: \`${APP_STAGE}\`
          Version: \`${{ steps.ver.outputs.value }}\`
          링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          JSON_MESSAGE=$(printf '%s\n' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"content": sys.stdin.read()}))')
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_MESSAGE" \
            "$DISCORD_WEBHOOK_URL"
